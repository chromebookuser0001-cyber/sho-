<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>shoのホームページ</title>
    <style>
        /* グラデーション背景の設定 */
        body { 
            background: linear-gradient(180deg, #000080 0%, #4b0082 100%);
            background-attachment: fixed;
            color: #ffffff; /* 文字を白にする */
            font-family: "MS UI Gothic", "Meiryo", sans-serif; 
            margin: 20px; 
            min-height: 100vh;
            line-height: 1.8;
        }

        /* 見出しのデザイン */
        h1 { border-bottom: 2px solid #ffffff; padding-bottom: 10px; font-size: 28px; }
        h2 { font-size: 20px; border-left: 10px solid #ffffff; padding-left: 10px; margin-top: 30px; }
        
        .main-container { display: flex; align-items: flex-start; margin-top: 20px; flex-wrap: wrap; }
        
        /* 左側に画像エリア */
        .left-image { flex: 0 0 250px; margin-right: 30px; margin-bottom: 20px; }
        .left-image img { 
            width: 100%; 
            border: 2px solid #ffffff; 
            box-shadow: 5px 5px 0px #333; 
            background: #eee; 
        }

        /* 右側に紹介文 */
        .right-info { flex: 1; min-width: 300px; }
        .right-info ul { list-style-type: square; }
        
        /* セクション区切り */
        .section { margin-top: 40px; border-top: 2px solid #ffffff; padding-top: 10px; }
        
        .discord-box { 
            background: #5865F2; color: white; padding: 10px 20px; 
            display: inline-block; border-radius: 5px; font-weight: bold; 
            margin-top: 10px; box-shadow: 3px 3px 0px #000;
        }

        /* リンクの色 */
        a { color: #00ffff; font-weight: bold; }

        footer { margin-top: 50px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

    <h1>shoのホームページ</h1>

    <div class="main-container">
        <div class="left-image">
            <img src="shophoto.jpg" alt="shoのプロフィール画像">
            <p style="text-align:center; font-size:12px;">（sho 近影）</p>
        </div>

        <div class="right-info">
            <h2>プロフィール</h2>
            <ul>
                <li><strong>ハンドルネーム：</strong> sho</li>
                <li><strong>趣味：</strong> Scratch、ゲーム制作、プログラミング</li>
                <li><strong>好きなもの：</strong> pc</li>
            </ul>
            <p>
                ここは僕が作ったものや好きなものをまとめる予定のサイトです。
            </p>
            
            <h3>連絡先</h3>
            <div class="discord-box">
                Discord ID: ksho2013_
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Scratch Projects</h2>
        <p>僕の作品はこちらからチェックできます！</p>
        <a href="https://scratch.mit.edu/users/shok0514/" target="_blank">
            👉 Scratch：shok0514 のプロフィールを見に行く
        </a>
    </div>

    <footer>
        <p>&copy; 2024 sho All Rights Reserved.</p>
        <p>このページは阿部寛さんのホームページをリスペクトして作られています。</p>
    </footer>

    <script>
        let inputCode = "";
        const secretWord = "sho";

        window.addEventListener("keydown", (e) => {
            inputCode += e.key;
            if (inputCode.length > secretWord.length) {
                inputCode = inputCode.slice(-secretWord.length);
            }
            if (inputCode === secretWord) {
                activateSecretMode();
            }
        });

        function activateSecretMode() {
            alert("SECRET MODE ACTIVATED!!");
            document.body.style.animation = "rainbow 2s linear infinite";
            const style = document.createElement("style");
            style.innerHTML = `
                @keyframes rainbow {
                    0% { background: #ff0000; }
                    20% { background: #ff8000; }
                    40% { background: #ffff00; }
                    60% { background: #00ff00; }
                    80% { background: #0000ff; }
                    100% { background: #ff0000; }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
